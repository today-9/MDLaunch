<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MDLaunch</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗂️</text></svg>">
<link rel="stylesheet" href="/static/style.css?v=13">
<link rel="stylesheet" href="/static/pygments.css?v=4">
<link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
<link id="viewer-theme-css" rel="stylesheet" href="/static/themes/viewer-light.css">
<link id="pdf-theme-css" rel="stylesheet" media="print" href="/static/themes/pdf-standard.css">
</head>
<body>
<div id="offline-banner" hidden>⚠️ サーバーに接続できません — MDLaunch.vbs をダブルクリックして起動してください(起動済みならこのバナーは数秒で消えます)</div>
<div id="app">
  <aside id="sidebar">
    <div class="ws-header">
      <span class="ws-icon">🗂️</span>
      <span class="ws-name">MDLaunch</span>
    </div>

    <button id="search-btn" class="side-item search-trigger">
      <span class="side-icon">🔍</span> 検索
      <kbd>Ctrl K</kbd>
    </button>
    <button id="home-btn" class="side-item">
      <span class="side-icon">🏠</span> ホーム
    </button>
    <button id="new-btn" class="side-item accent">
      <span class="side-icon">＋</span> 新規ノート
    </button>

    <div class="side-section">
      <div class="side-label with-action">
        <span>ページ</span>
        <button id="new-folder-btn" title="新規フォルダ">＋</button>
      </div>
      <div id="tree"></div>
    </div>

    <div class="side-section">
      <div class="side-label">タグ</div>
      <div id="tag-list"></div>
    </div>

    <div class="side-footer">
      <span id="note-count"></span>
      <span class="footer-actions">
        <button id="settings-btn" title="設定">⚙</button>
        <button id="quit-btn" title="サーバーを終了する">⏻ 終了</button>
      </span>
    </div>
  </aside>

  <!-- 設定ポップオーバー -->
  <div id="settings-pop" hidden>
    <div class="side-label">テーマ</div>
    <div class="theme-row"><span>画面</span><select id="viewer-theme-sel"></select></div>
    <div class="theme-row"><span>PDF</span><select id="pdf-theme-sel"></select></div>
  </div>

  <!-- ノートのコンテキストメニュー -->
  <div id="note-menu" hidden>
    <button data-act="rename">✏️ 表示名を変更</button>
    <button data-act="tags">🏷️ タグを編集</button>
    <button data-act="move">📂 フォルダへ移動</button>
    <button data-act="vscode">💻 VSCode で編集</button>
  </div>

  <!-- フォルダのコンテキストメニュー -->
  <div id="folder-menu" hidden>
    <button data-act="rename">✏️ フォルダ名を変更</button>
    <button data-act="newnote">📝 ここに新規ノート</button>
  </div>

  <main id="main">
    <div id="topbar">
      <div id="breadcrumb"></div>
      <button id="pdf-btn" class="topbar-btn" hidden>PDF に保存</button>
      <button id="edit-btn" class="topbar-btn" hidden>VSCode で編集</button>
    </div>
    <div id="content"></div>
  </main>
</div>

<!-- Ctrl+K 検索パレット -->
<div id="palette-overlay" hidden>
  <div id="palette">
    <div class="palette-input-row">
      <span class="palette-glass">🔍</span>
      <input id="palette-input" type="text" placeholder="ノートを検索…" autocomplete="off">
    </div>
    <div id="palette-results"></div>
  </div>
</div>

<!-- 新規ノートダイアログ -->
<div id="new-overlay" hidden>
  <div id="new-dialog">
    <h3>新規ノート</h3>
    <label>タイトル<input id="new-title" type="text" placeholder="ノートのタイトル"></label>
    <label>フォルダ(任意)<input id="new-folder" type="text" placeholder="例: projects/mdlaunch"></label>
    <label>タグ(カンマ区切り・任意)<input id="new-tags" type="text" placeholder="例: memo, idea"></label>
    <div class="dialog-actions">
      <button id="new-cancel" class="btn">キャンセル</button>
      <button id="new-create" class="btn primary">作成して VSCode で開く</button>
    </div>
  </div>
</div>

<!-- 汎用入力ダイアログ(表示名変更・タグ編集・移動) -->
<div id="input-overlay" hidden>
  <div id="input-dialog">
    <h3 id="input-title"></h3>
    <label><span id="input-label"></span><input id="input-field" type="text" list="input-suggestions" autocomplete="off"></label>
    <datalist id="input-suggestions"></datalist>
    <div class="dialog-actions">
      <button id="input-cancel" class="btn">キャンセル</button>
      <button id="input-ok" class="btn primary">OK</button>
    </div>
  </div>
</div>

<!-- 新規フォルダダイアログ -->
<div id="folder-overlay" hidden>
  <div id="folder-dialog">
    <h3>新規フォルダ</h3>
    <label>フォルダ名<input id="folder-name" type="text" placeholder="例: projects/2026"></label>
    <div class="dialog-actions">
      <button id="folder-cancel" class="btn">キャンセル</button>
      <button id="folder-create" class="btn primary">作成</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/static/vendor/mermaid.min.js"></script>
<script src="/static/vendor/katex/katex.min.js"></script>
<script src="/static/app.js?v=13"></script>
</body>
</html>
